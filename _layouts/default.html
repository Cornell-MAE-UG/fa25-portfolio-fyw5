<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">

  <!-- Jekyll compiles main.scss into main.css -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>

<body class="site-body d-flex flex-column min-vh-100">

  <header class="site-header">
    <nav class="navbar navbar-expand-lg custom-navbar shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="{{ '/' | relative_url }}">
          {{ site.title }}
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link {% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">
                Home
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if page.url == '/projects/' %}active{% endif %}" href="{{ '/projects/' | relative_url }}">
                Projects
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if page.url == '/cv/' %}active{% endif %}" href="{{ '/cv/' | relative_url }}">
                CV
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="site-main flex-grow-1 py-5">
    <div class="container">
      <div class="content-card">
        {{ content }}
      </div>
    </div>
  </main>

  <footer class="site-footer mt-auto">
    <div class="container py-4 text-center">
      <p class="mb-1">&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
      <p class="mb-0 small">Built with Jekyll, SCSS, and Bootstrap</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
