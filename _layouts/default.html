<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">

  <!-- Your SCSS (compiled to CSS) -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>

<body class="site-body d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <header>
    <nav class="navbar navbar-expand-lg custom-navbar shadow-sm">
      <div class="container">

        <a class="navbar-brand fw-semibold" href="{{ '/' | relative_url }}">
          {{ site.title }}
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">

            <li class="nav-item">
              <a class="nav-link {% if page.url == '/' %}active{% endif %}"
                 href="{{ '/' | relative_url }}">
                Home
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link {% if page.url == '/projects/' %}active{% endif %}"
                 href="{{ '/projects/' | relative_url }}">
                Projects
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link {% if page.url == '/cv/' %}active{% endif %}"
                 href="{{ '/cv/' | relative_url }}">
                CV
              </a>
            </li>

          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="flex-grow-1 py-5">
    <div class="container">

      <div class="content-card text-center">

        <!-- Optional page title -->
        {% if page.title %}
          <h1 class="mb-4">{{ page.title }}</h1>
        {% endif %}

        <!-- Page content -->
        <div class="page-content">
          {{ content }}
        </div>

      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer mt-auto">
    <div class="container text-center py-4">
      <p class="mb-1">
        &copy; {{ site.time | date: '%Y' }} {{ site.title }}
      </p>
      <p class="small mb-0">
        Built with Jekyll + SCSS + Bootstrap
      </p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
